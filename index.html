<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hellnet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=Playfair+Display:wght@900&family=Bebas+Neue&family=Press+Start+2P&family=Sacramento&family=Monoton&family=Black+Ops+One&family=Silkscreen&family=Rubik+Mono+One&family=Bungee&family=Permanent+Marker&family=Anton&family=Orbitron:wght@900&family=Unbounded:wght@900&family=Space+Grotesk:wght@700&family=DM+Serif+Text:ital@1&family=Faster+One&family=Honk&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      color: #fff;
      font-size: clamp(4rem, 12vw, 10rem);
      font-weight: 400;
      transition: font-family 0.15s ease;
    }
  </style>
</head>
<body>
  <h1 id="t">Hellnet</h1>
  <script>
    const f = [
      'Syne','Playfair Display','Bebas Neue','Press Start 2P',
      'Sacramento','Monoton','Black Ops One','Silkscreen',
      'Rubik Mono One','Bungee','Permanent Marker','Anton',
      'Orbitron','Unbounded','Space Grotesk','DM Serif Text',
      'Faster One','Honk',
    ];
    const e = document.getElementById('t');
    let i = 0;
    setInterval(() => { e.style.fontFamily = `'${f[i++%f.length]}'`; }, 400);
  </script>
</body>
</html>
