<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hellnet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=Playfair+Display:wght@900&family=Bebas+Neue&family=Press+Start+2P&family=Sacramento&family=Monoton&family=Black+Ops+One&family=Silkscreen&family=Rubik+Mono+One&family=Bungee&family=Permanent+Marker&family=Anton&family=Orbitron:wght@900&family=Unbounded:wght@900&family=Space+Grotesk:wght@700&family=DM+Serif+Text:ital@1&family=Faster+One&family=Honk&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 300;
      letter-spacing: 2px;
    }
    .c {
      background: linear-gradient(135deg, #00d4ff, #7b2ff7, #ff6b6b, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <h1 id="t">Hellnet</h1>
  <script>
    const f = [
      ['Syne',''],['Playfair Display','c'],['Bebas Neue',''],
      ['Press Start 2P','c'],['Sacramento',''],['Monoton','c'],
      ['Black Ops One',''],['Silkscreen','c'],['Rubik Mono One',''],
      ['Bungee','c'],['Permanent Marker',''],['Anton','c'],
      ['Orbitron',''],['Unbounded','c'],['Space Grotesk',''],
      ['DM Serif Text','c'],['Faster One',''],['Honk',''],
    ];
    const e = document.getElementById('t');
    let i = 0;
    setInterval(() => {
      const [fn, cls] = f[i++%f.length];
      e.style.fontFamily = `'${fn}'`;
      e.className = cls;
    }, 100);
  </script>
</body>
</html>
