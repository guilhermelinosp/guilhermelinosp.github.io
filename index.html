    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;

      font-weight: 400;
      letter-spacing: 2px;

<body>
  <h1 id="t">hellnet</h1>
  <script>
    const f = [
      'Rubik Glitch','Silkscreen','Creepster','Monoton',
      'Frijole','Uncial Antiqua','Bangers','Stint Ultra Expanded',
      'Rakkas','Wallpoet','Rubik Broken Fax','VT323',

    let i = 0;
    setInterval(() => { e.style.fontFamily = `'${f[i++%f.length]}'`; }, 150);
