<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hellnet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Rubik+Glitch&family=Orbitron:wght@400;900&family=Unbounded:wght@400;900&family=Sora:wght@400;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .container {
      max-width: 720px;
      width: 100%;
    }

    /* Animated font cycling */
    .font-cycler {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7, #ff6b6b, #00d4ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient 4s ease infinite;
      transition: font-family 1s ease-in-out;
      min-height: 1.2em;
      margin-bottom: 0.3rem;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: #666;
      margin-bottom: 2.5rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      transition: font-family 1s ease-in-out;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin: 2.5rem 0;
    }

    .status-card {
      background: #12121a;
      border: 1px solid #1e1e28;
      border-radius: 12px;
      padding: 1rem;
      transition: border-color 0.3s;
    }
    .status-card:hover { border-color: #00d4ff40; }

    .status-card .label {
      font-size: 0.7rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 0.3rem;
    }
    .status-card .value {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .status-card .value.up { color: #22c55e; }
    .status-card .value.info { color: #00d4ff; }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .links a {
      color: #999;
      text-decoration: none;
      padding: 0.6rem 1.2rem;
      border: 1px solid #1e1e28;
      border-radius: 8px;
      font-size: 0.85rem;
      transition: all 0.3s;
    }
    .links a:hover {
      color: #00d4ff;
      border-color: #00d4ff;
      background: #00d4ff08;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="font-cycler" id="title">Hellnet</div>
    <p class="subtitle" id="subtitle">Private Cloud Infrastructure</p>

    <div class="status-grid">
      <div class="status-card">
        <div class="label">Cluster</div>
        <div class="value up">Operational</div>
      </div>
      <div class="status-card">
        <div class="label">Nodes</div>
        <div class="value info">4</div>
      </div>
      <div class="status-card">
        <div class="label">Stack</div>
        <div class="value info">Talos + Cilium</div>
      </div>
      <div class="status-card">
        <div class="label">Storage</div>
        <div class="value info">Longhorn</div>
      </div>
    </div>

    <div class="links">
      <a href="https://headlamp.hellnet.com.br">Headlamp</a>
      <a href="https://hubble.hellnet.com.br">Hubble</a>
      <a href="https://longhorn.hellnet.com.br">Longhorn</a>
      <a href="https://grafana.hellnet.com.br">Grafana</a>
      <a href="https://github.com/guilhermelinosp">GitHub</a>
    </div>

    <div class="footer">Hellnet &mdash; Brazil</div>
  </div>

  <script>
    const fonts = [
      ['Inter', 'Space Grotesk'],
      ['Orbitron', 'Space Grotesk'],
      ['Unbounded', 'Sora'],
      ['JetBrains Mono', 'DM Mono'],
      ['Rubik Glitch', 'Inter'],
    ];

    let i = 0;
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('subtitle');

    setInterval(() => {
      i = (i + 1) % fonts.length;
      const [tfont, sfont] = fonts[i];
      titleEl.style.fontFamily = `'${tfont}', sans-serif`;
      subEl.style.fontFamily = `'${sfont}', sans-serif`;
    }, 3000);
  </script>
</body>
</html>
