<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hellnet - Homelab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f11;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 640px; text-align: center; }
        h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 2rem;
        }
        .links a {
            color: #00d4ff;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border: 1px solid #2a2a2e;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .links a:hover {
            border-color: #00d4ff;
            background: #1a1a1e;
        }
        .status {
            margin-top: 3rem;
            padding: 1rem;
            border-radius: 8px;
            background: #1a1a1e;
            font-size: 0.85rem;
            color: #666;
        }
        .status span { color: #4caf50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hellnet</h1>
        <p class="subtitle">Homelab &amp; Infrastructure</p>

        <div class="links">
            <a href="https://headlamp.hellnet.com.br">Headlamp (Kubernetes)</a>
            <a href="https://hubble.hellnet.com.br">Hubble (Cilium)</a>
            <a href="https://longhorn.hellnet.com.br">Longhorn (Storage)</a>
            <a href="https://wazuh.hellnet.com.br">Wazuh (SIEM)</a>
            <a href="https://pihole.hellnet.com.br">Pi-hole (DNS)</a>
        </div>

        <div class="status">
            <span>●</span> Cluster operacional · 4 nós · Talos + Cilium + Longhorn
        </div>
    </div>
</body>
</html>
