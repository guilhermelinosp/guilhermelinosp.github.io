<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hellnet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&family=Space+Grotesk:wght@300&family=JetBrains+Mono:wght@300&family=DM+Serif+Display:ital@1&family=Outfit:wght@300&family=Sora:wght@300&family=Bricolage+Grotesque:wght@300&family=Fraunces:opsz,wght@9..144,300&family=Public+Sans:wght@300&family=Plus+Jakarta+Sans:wght@300&family=Syne:wght@400&family=Unbounded:wght@300&family=Archivo:wght@300&family=Cabinet+Grotesk:wght@300&family=Chillax:wght@300&family=Clash+Display:wght@300&family=Gambarino:wght@400&family=General+Sans:wght@300&family=Hanken+Grotesk:wght@300&family=Karla:wght@300&family=Lora:ital@1&family=Manrope:wght@300&family=Montserrat:wght@300&family=Newsreader:opsz@6..72&family=Nunito:wght@300&family=PT+Serif:ital@1&family=Quicksand:wght@300&family=Raleway:wght@300&family=STIX+Two+Text:ital@1&family=Satoshi:wght@300&family=Source+Serif+4:opsz@8..60&family=Teko:wght@300&family=Work+Sans:wght@300&family=Zilla+Slab:wght@300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      color: #fff;
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 300;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <h1 id="t">Hellnet</h1>
  <script>
    const f = [
      'Inter','Space Grotesk','JetBrains Mono','DM Serif Display',
      'Outfit','Sora','Bricolage Grotesque','Fraunces',
      'Public Sans','Plus Jakarta Sans','Syne','Unbounded',
      'Archivo','Cabinet Grotesk','Chillax','Clash Display',
      'Gambarino','General Sans','Hanken Grotesk','Karla',
      'Lora','Manrope','Montserrat','Newsreader',
      'Nunito','PT Serif','Quicksand','Raleway',
      'STIX Two Text','Satoshi','Source Serif 4','Teko',
      'Work Sans','Zilla Slab',
    ];
    const e = document.getElementById('t');
    let i = 0;
    setInterval(() => { e.style.fontFamily = `'${f[i++%f.length]}'`; }, 150);
  </script>
</body>
</html>
